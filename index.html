<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê Laumar</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

header {
    background: #000;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.banner {
    background: linear-gradient(to right, #000, #8b0000);
    color: white;
    padding: 40px;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
}

.card {
    width: 300px;
    border: 1px solid #eee;
    border-radius: 10px;
    margin: 20px;
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.preco {
    color: red;
    font-size: 22px;
}

button {
    background: #8b0000;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
}

.carrinho {
    position: fixed;
    right: 10px;
    top: 10px;
    background: black;
    color: white;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
}

.frete {
    text-align: center;
    margin: 20px;
}

.feedback {
    background: #f5f5f5;
    padding: 20px;
    text-align: center;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50%;
}
</style>
</head>

<body>

<header>Ateliê Laumar</header>

<div class="banner">
    <h1>Moda íntima sofisticada</h1>
    <p>Enviamos para todo o Brasil 🇧🇷</p>
</div>

<div class="carrinho">
    🛒 Itens:
    <ul id="lista"></ul>
    ⏳ <span id="tempo">10:00</span>
</div>

<div class="container">

<div class="card">
    <img src="produto1.jpg">
    <h3>Conjunto Preto Renda Ajustável</h3>
    <p class="preco">R$ 60,00</p>
    <p>🔥 Restam apenas 5 unidades</p>
    <button onclick="addCarrinho('Conjunto Preto Renda Ajustável', 60)">Comprar</button>
</div>

</div>

<div class="frete">
    <h3>Calcular Frete</h3>
    <input id="cep" placeholder="Digite seu CEP">
    <button onclick="buscarCEP()">Calcular</button>
    <p id="resultadoFrete"></p>
</div>

<div class="feedback">
    <h2>Feedbacks</h2>
    <p>⭐⭐⭐⭐⭐ "Perfeito, super confortável!"</p>
    <p>⭐⭐⭐⭐⭐ "Entrega rápida e discreta!"</p>
</div>

<div style="text-align:center; margin:20px;">
    <button onclick="finalizarCompra()">Finalizar Compra</button>
</div>

<a class="whatsapp" href="https://wa.me/5521975975595" target="_blank">💬</a>

<script>
let carrinho = [];

function addCarrinho(nome, preco) {
    carrinho.push({nome, preco});

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrinho.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item.nome;
        lista.appendChild(li);
    });
}

// BUSCAR CEP REAL
async function buscarCEP() {
    let cep = document.getElementById("cep").value;

    if (cep.length < 8) {
        alert("CEP inválido");
        return;
    }

    let resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    let dados = await resposta.json();

    if (dados.erro) {
        document.getElementById("resultadoFrete").innerText = "CEP não encontrado";
        return;
    }

    let frete = calcularFretePorEstado(dados.uf);

    document.getElementById("resultadoFrete").innerText =
        `Entrega para ${dados.localidade} - ${dados.uf}: R$ ${frete}`;
}

// FRETE POR REGIÃO (simulação inteligente)
function calcularFretePorEstado(uf) {
    if (["RJ","SP","MG","ES"].includes(uf)) return 15;
    if (["PR","SC","RS"].includes(uf)) return 20;
    if (["BA","PE","CE"].includes(uf)) return 25;
    return 30;
}

// TIMER
let tempo = 600;

setInterval(() => {
    let min = Math.floor(tempo / 60);
    let seg = tempo % 60;

    document.getElementById("tempo").innerText =
        (min<10?"0":"")+min+":"+(seg<10?"0":"")+seg;

    if (tempo > 0) tempo--;
}, 1000);

// FINALIZAR COMPRA COM PRODUTOS
function finalizarCompra() {
    if (carrinho.length === 0) {
        alert("Carrinho vazio!");
        return;
    }

    let mensagem = "Olá, quero comprar:\n";

    carrinho.forEach(item => {
        mensagem += "- " + item.nome + "\n";
    });

    window.open("https://wa.me/5521975975595?text=" + encodeURIComponent(mensagem));
}
</script>

</body>
</html>
