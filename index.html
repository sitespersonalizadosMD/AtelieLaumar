<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ateliê Laumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #1a0e08;
  color: #fff;
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: #140905;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 50px;
}

.logo h1 {
  color: #d4a15a;
  font-size: 20px;
}

/* PRODUTO */
.produto {
  display: flex;
  gap: 40px;
  padding: 60px;
  align-items: center;
}

.produto img {
  width: 400px;
  border-radius: 12px;
}

.info {
  max-width: 400px;
}

.preco {
  color: #d4a15a;
  font-size: 24px;
  margin: 10px 0;
}

/* QUANTIDADE */
.qtd {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 20px 0;
}

.qtd button {
  background: #d4a15a;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-size: 18px;
}

/* BOTÃO COMPRAR */
.btn-comprar {
  width: 100%;
  padding: 15px;
  background: #d4a15a;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn-comprar.ativo {
  background: #25D366;
}

/* CARRINHO */
.carrinho {
  position: fixed;
  right: -400px;
  top: 0;
  width: 350px;
  height: 100%;
  background: #0f0603;
  padding: 20px;
  transition: 0.3s;
}

.carrinho.ativo {
  right: 0;
}

.item {
  margin-bottom: 10px;
}

.total {
  margin-top: 20px;
  font-size: 18px;
}

/* WHATSAPP */
.whatsapp {
  width: 100%;
  padding: 15px;
  background: #25D366;
  border: none;
  margin-top: 20px;
  cursor: pointer;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/mnt/data/2e93644d-24c7-4d18-a2cb-65ae643dacdf.png">
    <h1>Ateliê Laumar</h1>
  </div>
  <button onclick="toggleCart()">🛒</button>
</header>

<section class="produto">
  <img src="WhatsApp Image 2026-04-06 at 10.28.41.jpeg">

  <div class="info">
    <h2>Conjunto Renda Luxo</h2>
    <p class="preco">R$ 60,00</p>

    <!-- QUANTIDADE -->
    <div class="qtd">
      <button onclick="menos()">-</button>
      <span id="qtd">1</span>
      <button onclick="mais()">+</button>
    </div>

    <!-- BOTÃO DINÂMICO -->
    <button id="btnComprar" class="btn-comprar" onclick="comprar()">
      Comprar
    </button>
  </div>
</section>

<!-- CARRINHO -->
<div class="carrinho" id="cart">
  <h2>Seu Carrinho</h2>
  <div id="lista"></div>
  <p class="total" id="total"></p>

  <button class="whatsapp" onclick="finalizar()">
    Finalizar no WhatsApp
  </button>
</div>

<script>
let quantidade = 1;
let preco = 60;
let cart = [];

// QUANTIDADE
function mais(){
  quantidade++;
  atualizarQtd();
}

function menos(){
  if(quantidade > 1){
    quantidade--;
    atualizarQtd();
  }
}

function atualizarQtd(){
  document.getElementById("qtd").innerText = quantidade;
}

// COMPRAR
function comprar(){
  let btn = document.getElementById("btnComprar");

  btn.innerText = "Adicionado ✓";
  btn.classList.add("ativo");

  setTimeout(()=>{
    btn.innerText = "Comprar";
    btn.classList.remove("ativo");
  },1500);

  cart.push({
    nome: "Conjunto Renda Luxo",
    qtd: quantidade,
    total: quantidade * preco
  });

  atualizarCarrinho();
}

// CARRINHO
function atualizarCarrinho(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let total = 0;

  cart.forEach(item=>{
    lista.innerHTML += `
      <div class="item">
        ${item.nome} - ${item.qtd}x = R$ ${item.total}
      </div>
    `;
    total += item.total;
  });

  document.getElementById("total").innerText = "Total: R$ " + total;
}

// ABRIR
function toggleCart(){
  document.getElementById("cart").classList.toggle("ativo");
}

// FINALIZAR
function finalizar(){
  let mensagem = "Pedido:%0A";
  let total = 0;

  cart.forEach(item=>{
    mensagem += `- ${item.nome} (${item.qtd}) R$ ${item.total}%0A`;
    total += item.total;
  });

  mensagem += `%0ATotal: R$ ${total}`;

  window.open(`https://wa.me/5521975975595?text=${mensagem}`);
}
</script>

</body>
</html>
