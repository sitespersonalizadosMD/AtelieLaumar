<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ateliê Laumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #0f0a07;
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.8);
  position: sticky;
  top: 0;
}

header h1 {
  color: #d4a15a;
  font-weight: 600;
}

header button {
  background: #d4a15a;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 6px;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), #0f0a07),
              url("https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03");
  background-size: cover;
  text-align: center;
}

.hero h2 {
  font-size: 40px;
  margin-bottom: 20px;
}

.hero button {
  padding: 12px 25px;
  background: #d4a15a;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

/* PRODUTOS */
.produtos {
  padding: 60px 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.card {
  background: #1c0f0a;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.card-body {
  padding: 20px;
}

.card h3 {
  margin-bottom: 10px;
}

.preco {
  color: #d4a15a;
  font-weight: bold;
}

.card button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border: none;
  background: #d4a15a;
  cursor: pointer;
}

.urgencia {
  font-size: 13px;
  color: #ff4d4d;
}

/* CARRINHO */
.carrinho {
  position: fixed;
  right: -400px;
  top: 0;
  width: 350px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  overflow-y: auto;
}

.carrinho.ativo {
  right: 0;
}

.carrinho h2 {
  margin-bottom: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1c0f0a;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}

.item button {
  background: #ff4d4d;
  border: none;
  padding: 5px 8px;
  cursor: pointer;
  color: white;
  border-radius: 4px;
}

.total {
  margin-top: 20px;
  font-size: 18px;
}

/* FRETE */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

/* BOTÃO WHATSAPP */
.btn-whats {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #25D366;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  margin-top: 40px;
  background: #000;
}
</style>
</head>

<body>

<header>
  <h1>Ateliê Laumar</h1>
  <button onclick="toggleCart()">🛒 Carrinho</button>
</header>

<section class="hero">
  <h2>Elegância que você sente na pele</h2>
  <button onclick="scrollToProdutos()">Comprar agora</button>
</section>

<section class="produtos" id="produtos">
  <div class="grid">

    <div class="card">
      <img src="WhatsApp Image 2026-04-06 at 10.28.41.jpeg">
      <div class="card-body">
        <h3>Conjunto Renda Luxo</h3>
        <p class="preco">R$ 60,00</p>
        <button onclick="addToCart('Conjunto Renda Luxo',60)">Comprar</button>
        <p class="urgencia">⚠️ Últimas unidades disponíveis</p>
      </div>
    </div>

  </div>
</section>

<!-- CARRINHO -->
<div class="carrinho" id="cart">
  <h2>Seu Carrinho</h2>
  <div id="lista"></div>
  <p class="total" id="total"></p>

  <p id="timer">⏳ 10:00</p>

  <h3>Frete</h3>
  <input id="cep" placeholder="Digite seu CEP">
  <button onclick="frete()">Calcular</button>
  <p id="frete"></p>

  <!-- BOTÃO FINALIZAR -->
  <button class="btn-whats" onclick="finalizarCompra()">
    Finalizar Compra via WhatsApp
  </button>
</div>

<footer>
  <p>Envio para todo Brasil 🇧🇷 | Compra segura 🔒</p>
</footer>

<script>
let cart = [];

// SCROLL
function scrollToProdutos() {
  document.getElementById("produtos").scrollIntoView({ behavior: "smooth" });
}

// ABRIR CARRINHO
function toggleCart() {
  document.getElementById("cart").classList.toggle("ativo");
}

// ADICIONAR ITEM
function addToCart(nome, preco) {
  cart.push({ nome, preco });
  atualizar();
}

// ATUALIZAR
function atualizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    lista.innerHTML += `
      <div class="item">
        ${item.nome} - R$ ${item.preco}
        <button onclick="removerItem(${index})">X</button>
      </div>
    `;
    total += item.preco;
  });

  document.getElementById("total").innerText = "Total: R$ " + total;
}

// REMOVER
function removerItem(index) {
  cart.splice(index, 1);
  atualizar();
}

// TIMER
let t = 600;
setInterval(() => {
  let m = Math.floor(t/60);
  let s = t%60;
  document.getElementById("timer").innerText = `⏳ ${m}:${s<10?'0':''}${s}`;
  t--;
},1000);

// FRETE
function frete(){
  let cep = document.getElementById("cep").value;
  let valor = cep.startsWith("0") ? 15 : 22;
  document.getElementById("frete").innerText = "Frete: R$ " + valor;
}

// WHATSAPP
function finalizarCompra() {
  if(cart.length === 0){
    alert("Seu carrinho está vazio!");
    return;
  }

  let mensagem = "Olá, quero finalizar meu pedido:%0A%0A";
  let total = 0;

  cart.forEach(item => {
    mensagem += `- ${item.nome} | R$ ${item.preco}%0A`;
    total += item.preco;
  });

  mensagem += `%0ATotal: R$ ${total}%0A`;

  let cep = document.getElementById("cep").value;
  if(cep){
    mensagem += `CEP: ${cep}%0A`;
  }

  mensagem += "%0APode me ajudar com o pagamento?";

  let numero = "5521999999999"; // ALTERA AQUI

  let url = `https://wa.me/${numero}?text=${mensagem}`;
  window.open(url, "_blank");
}
</script>
